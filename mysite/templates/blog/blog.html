{% extends 'blog/base.html' %}

{% block content %}
<div style="margin-top: 5rem;">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Recent Works</h2>
    
    {% for post in posts %}
    <div style="margin-bottom: 4rem; padding-bottom: 2rem; border-bottom: 1px solid #f2f2f2;">
        <small style="color: var(--accent); text-transform: uppercase; letter-spacing: 1px;">{{ post.category }}</small>
        <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0.5rem 0;">{{ post.title }}</h3>
        <p style="color: #444; line-height: 1.8; font-size: 1.05rem;">{{ post.content|truncatewords:30 }}</p>
        <a href="#" style="color: var(--text); font-weight: 600; text-decoration: none; font-size: 0.9rem;">Read Full Piece →</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
