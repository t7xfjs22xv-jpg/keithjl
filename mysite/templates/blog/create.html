{% extends 'blog/base.html' %}

{% block content %}
<div style="margin-top: 5rem; max-width: 700px; margin-left: auto; margin-right: auto;">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 3rem;">Draft a new piece.</h2>
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 2rem;">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title of your work" 
               style="font-family: 'Playfair Display', serif; font-size: 2rem; border: none; border-bottom: 1px solid var(--border); background: transparent; padding: 10px 0; outline: none;">
        
        <input type="text" name="category" placeholder="Category (e.g. Poetry, Essay)" 
               style="font-size: 0.9rem; border: none; border-bottom: 1px solid var(--border); background: transparent; padding: 10px 0; outline: none; color: var(--accent);">
        
        <textarea name="content" placeholder="Begin your writing..." 
                  style="min-height: 400px; font-size: 1.1rem; border: none; background: transparent; line-height: 1.8; outline: none; resize: vertical;"></textarea>
        
        <div style="text-align: right; margin-top: 2rem;">
            <button type="submit" class="btn-primary" style="border: none; cursor: pointer;">Publish to the Wall</button>
        </div>
    </form>
</div>
{% endblock %}
